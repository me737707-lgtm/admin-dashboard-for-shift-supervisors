<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Supervisor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* ====== Dark Theme Variables ====== */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2d2d2d;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-blue: #8ab4f8;
            --accent-green: #81c995;
            --accent-red: #f28b82;
            --border-color: #3c4043;
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-main); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Styles */
        .login-container { background: var(--bg-card); padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid var(--border-color); }
        .login-container h2 { margin-bottom: 20px; color: var(--text-main); }
        .login-container input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); border-radius: 5px; box-sizing: border-box; font-size: 14px; background: var(--bg-input); color: var(--text-main); }
        .login-btn { width: 100%; padding: 12px; background: var(--accent-blue); color: #000; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .login-btn:hover { opacity: 0.9; }
        .error-msg { color: var(--accent-red); font-size: 13px; margin-top: 10px; display: none; }

        /* Dashboard Styles */
        .dashboard-container { width: 95%; max-width: 1000px; background: var(--bg-card); border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); padding: 20px; display: none; border: 1px solid var(--border-color); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { color: var(--text-main); margin: 0; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .logout-btn { background: var(--bg-input); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 5px; cursor: pointer; color: var(--text-muted); }
        
        /* Filters */
        .filter-bar { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; background: var(--bg-main); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .filter-select, .date-picker { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 5px; font-family: 'Roboto'; cursor: pointer; min-width: 150px; background: var(--bg-input); color: var(--text-main); }
        .status-indicator { font-size: 12px; color: var(--text-muted); margin-left: auto; }
        .status-dot { height: 8px; width: 8px; background-color: var(--accent-green); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Stats Cards */
        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .main-stats { grid-template-columns: 1fr; } }
        
        .card { background: var(--bg-main); padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card-title { color: var(--text-muted); font-size: 18px; font-weight: 700; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; }
        .stat-label { color: var(--text-muted); }
        .stat-value { font-weight: 700; color: var(--accent-blue); }
        
        .card.lidar { border-left-color: var(--accent-green); }
        .card.lane { border-left-color: var(--accent-red); }
        .card.total { border-left-color: var(--accent-blue); grid-column: span 2; text-align: center; }
        @media (max-width: 600px) { .card.total { grid-column: span 1; } }

        /* Unit Section */
        .unit-section { background: var(--bg-main); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .unit-section h3 { margin-top: 0; font-size: 16px; color: var(--text-muted); margin-bottom: 15px; }
        
        .unit-row { 
            display: flex; justify-content: space-between; align-items: center; padding: 12px; 
            background: var(--bg-card); margin-bottom: 5px; border-radius: 4px; border: 1px solid var(--border-color); 
            cursor: pointer; transition: all 0.2s;
        }
        .unit-row:hover { background: #2a2a2a; border-color: var(--accent-blue); }
        .unit-name { font-weight: 500; color: var(--text-main); }
        .unit-count { font-weight: 700; color: var(--accent-blue); font-size: 18px; }

        /* Modal Styles (Centered & Dark) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); 
            display: none; 
            justify-content: center; align-items: center; /* Centering Happens Here */
            z-index: 1000; 
        }
        .modal-content {
            background: var(--bg-card); padding: 0; border-radius: 8px; width: 340px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            position: relative; overflow: hidden;
            border: 1px solid var(--border-color);
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-header {
            background: var(--accent-blue); color: #000; padding: 15px; text-align: center;
        }
        .modal-title { margin: 0; font-size: 18px; font-weight: 500; }
        .modal-body { padding: 20px; }
        .modal-close {
            position: absolute; top: 10px; right: 10px; font-size: 20px; cursor: pointer; 
            color: #000; opacity: 0.7;
        }
        .modal-close:hover { opacity: 1; }
        
        /* Detail Box inside Modal */
        .detail-box { margin-bottom: 15px; }
        .detail-header { font-weight: 700; font-size: 14px; color: var(--text-muted); margin-bottom: 5px; display: flex; align-items: center; }
        .detail-header.lidar { color: var(--accent-green); }
        .detail-header.lane { color: var(--accent-red); }
        .detail-row { display: flex; justify-content: space-between; padding: 5px 10px; background: var(--bg-main); margin-top: 2px; border-radius: 4px; font-size: 13px; color: var(--text-main); }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.9); display: none; justify-content: center; align-items: center; z-index: 999; }
        .spinner { border: 4px solid var(--border-color); border-top: 4px solid var(--accent-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay"><div class="spinner"></div></div>

    <!-- Modal -->
    <div id="unitModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Unit Name</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Details Here -->
            </div>
        </div>
    </div>

    <!-- Login -->
    <div id="loginSection" class="login-container">
        <h2><i class="fas fa-user-shield"></i> Shift Supervisor Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="login-btn" onclick="attemptLogin()">Sign In</button>
        <p id="loginError" class="error-msg">Invalid username or password</p>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="dashboard-container">
        <div class="header">
            <h2>Dashboard Overview</h2>
            <div class="header-right">
                <span id="welcomeUser">Welcome, User</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label>Date</label>
                <input type="date" id="taskDate" class="date-picker" onchange="fetchStats()">
            </div>
            <div class="filter-group">
                <label>Shift</label>
                <select id="shiftSelect" class="filter-select" onchange="fetchStats()">
                    <option value="Morning">Morning</option>
                    <option value="Night">Night</option>
                    <option value="Over Night">Overnight</option>
                </select>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span> Auto-Refresh Active
            </div>
        </div>

        <div class="main-stats">
            <div class="card total">
                <div class="card-title">Total Tasks</div>
                <div style="font-size: 30px; color: var(--accent-blue); font-weight: bold;" id="totalTasks">0</div>
            </div>

            <div class="card lidar">
                <div class="card-title">LIDAR Tasks</div>
                <div class="stat-row"><span class="stat-label">FP Tasks:</span><span class="stat-value" id="lidarFp">0</span></div>
                <div class="stat-row"><span class="stat-label">QA Tasks:</span><span class="stat-value" id="lidarQa">0</span></div>
            </div>

            <div class="card lane">
                <div class="card-title">Lane Line Tasks</div>
                <div class="stat-row"><span class="stat-label">FP Tasks:</span><span class="stat-value" id="laneFp">0</span></div>
                <div class="stat-row"><span class="stat-label">QA Tasks:</span><span class="stat-value" id="laneQa">0</span></div>
            </div>
        </div>

        <div class="unit-section">
            <h3><i class="fas fa-door-open"></i> Room/Unit Summary (Click for details)</h3>
            <div id="unitDetails"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxCThBUQ7TRhF1N-7illcivD97hE_Blx9opREwx7okyP08qs64F2DFCC_XZaAHNx3tk/exec";
        let currentUser = "";
        let refreshInterval;
        let cachedData = {}; 

        $(document).ready(function() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            $('#taskDate').val(dateStr);
        });

        function attemptLogin() {
            const user = $('#username').val().trim();
            const pass = $('#password').val().trim();
            if(!user || !pass) return;

            showLoading(true);
            $.ajax({
                url: API_URL, type: "GET", dataType: "jsonp",
                data: { action: "login", username: user, password: pass },
                success: function(response) {
                    showLoading(false);
                    if (response.success) {
                        currentUser = response.username;
                        $('#loginSection').hide();
                        $('#dashboardSection').show();
                        $('#welcomeUser').text("Welcome, " + currentUser);
                        fetchStats();
                        clearInterval(refreshInterval);
                        refreshInterval = setInterval(fetchStats, 15000);
                    } else {
                        $('#loginError').fadeIn().delay(3000).fadeOut();
                    }
                },
                error: function() { showLoading(false); alert("Connection Error!"); }
            });
        }

        function fetchStats() {
            if(!currentUser || !$('#dashboardSection').is(':visible')) return;
            const rawDate = $('#taskDate').val();
            const shift   = $('#shiftSelect').val();
            if(!rawDate) return;

            const parts = rawDate.split('-');
            const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;

            $.ajax({
                url: API_URL, type: "GET", dataType: "jsonp",
                data: { action: "getStats", date: formattedDate, shift: shift },
                success: function(response) {
                    if (response.success) {
                        cachedData = response.data; 
                        renderDashboard(response.data);
                    }
                }
            });
        }

        function renderDashboard(data) {
            $('#totalTasks').text(data.totalTasks);
            $('#lidarFp').text(data.lidarFp);
            $('#lidarQa').text(data.lidarQa);
            $('#laneFp').text(data.laneFp);
            $('#laneQa').text(data.laneQa);

            let unitHtml = '';
            const units = data.byUnit;
            
            if(Object.keys(units).length > 0){
                for (let key in units) {
                    unitHtml += `
                        <div class="unit-row" onclick="openModal('${key}')">
                            <span class="unit-name"><i class="fas fa-door-open" style="margin-right:8px; color:var(--text-muted)"></i> ${key}</span>
                            <span class="unit-count">${units[key].total} Tasks</span>
                        </div>
                    `;
                }
            } else {
                unitHtml = '<div class="unit-row">No data for this shift yet</div>';
            }
            $('#unitDetails').html(unitHtml);
        }

        function openModal(unitName) {
            const unitData = cachedData.byUnit[unitName];
            if(!unitData) return;

            $('#modalTitle').text(unitName);
            
            let bodyHtml = `
                <div class="detail-box">
                    <div class="detail-header lidar"><i class="fas fa-circle" style="font-size:8px; margin-right:5px;"></i> LIDAR</div>
                    <div class="detail-row"><span>FP Tasks</span><strong>${unitData.lidarFp}</strong></div>
                    <div class="detail-row"><span>QA Tasks</span><strong>${unitData.lidarQa}</strong></div>
                </div>
                <div class="detail-box" style="margin-bottom:0;">
                    <div class="detail-header lane"><i class="fas fa-circle" style="font-size:8px; margin-right:5px;"></i> Lane Line</div>
                    <div class="detail-row"><span>FP Tasks</span><strong>${unitData.laneFp}</strong></div>
                    <div class="detail-row"><span>QA Tasks</span><strong>${unitData.laneQa}</strong></div>
                </div>
            `;
            
            $('#modalBody').html(bodyHtml);
            
            // Correct way to show Flexbox centering with jQuery
            $('#unitModal').css('display', 'flex').hide().fadeIn(200);
        }

        function closeModal(e) {
            if(!e || e.target.id === 'unitModal') {
                $('#unitModal').fadeOut(200);
            }
        }

        function showLoading(show) {
            if(show) $('#loading').css('display', 'flex');
            else $('#loading').css('display', 'none');
        }

        function logout() { 
            clearInterval(refreshInterval);
            location.reload(); 
        }
        
        $('#password').keypress(function(e) { if(e.which == 13) attemptLogin(); });
    </script>
</body>
</html>
